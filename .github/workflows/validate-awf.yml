name: Validate AWF

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate AWF metadata and artifacts
        run: python tools/validate_awf.py --strict
