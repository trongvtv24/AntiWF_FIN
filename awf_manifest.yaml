awf_version: "4.0.0"
metadata_schema_version: "1.0.0"
status: "active"
source_of_truth:
  router: "awf_manifest.yaml"
  safety_gate: "global_workflows/GLOBAL_SAFETY_TRUTHFULNESS_GATE.md"
  context_system: "global_workflows/CONTEXT_SYSTEM.md"
routing:
  precedence:
    - "explicit_command"
    - "active_workflow_state"
    - "user_intent"
    - "contextual_recommendation"
  default_language: "vi"
  fallback_workflow: "/help"
  required_global_gates:
    - "global_safety_truthfulness_gate"
  context_contract: "context_system"
risk_levels:
  low: "Read-only analysis, explanation, summaries, and recommendations."
  medium: "Local file edits, generated docs, tests, or bounded local automation."
  high: "Dependency changes, schema changes, deploy, publish, browser control, process control, or external APIs."
  critical: "Public posting, production deploy, destructive operations, secrets, or account-impacting actions."
confirmation_policy:
  read_only_auto: "May run without user confirmation."
  normal_edits: "May run after the user asks for implementation."
  high_risk: "Requires clear user confirmation before execution."
  forbidden_without_explicit_confirmation:
    - "production_deploy"
    - "public_publish"
    - "delete_data"
    - "destructive_git"
    - "secret_or_token_change"
    - "kill_process"
    - "schema_migration"
gates:
  global_safety_truthfulness_gate:
    path: "global_workflows/GLOBAL_SAFETY_TRUTHFULNESS_GATE.md"
    applies_to:
      - "claims"
      - "code_change"
      - "deploy"
      - "publish"
      - "research"
      - "content"
      - "security"
  context_system:
    path: "global_workflows/CONTEXT_SYSTEM.md"
    applies_to:
      - "save"
      - "recap"
      - "handover"
      - "session_restore"
      - "project_memory"
